# Schema-to-module mappings for generate_structures.py
# Galdr consumes the final anthropic render schema (from regin)
# plus the three output control surface schemas (from verdandi agent-output).

[checkpoint]
agent-anthropic-render = "gen/anthropic_render"

[output]
agent-output-structure = "gen/output_structure"
agent-output-content = "gen/output_content"
agent-output-display = "gen/output_display"
