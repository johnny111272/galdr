[section_order]
order = [
    "identity",
    "security_boundary",
    "critical_rules",
    "input",
    "instructions",
    "examples",
    "output",
    "writing_output",
    "constraints",
    "anti_patterns",
    "success_criteria",
    "failure_criteria",
    "return_format",
]

[identity]
field_ordering = "identity_first"
fuse_role_identity_declaration_and_role_description = false
role_identity_postscript_template_visible = true
role_expertise_postscript_visible = true
identity_reminder_closing_template_visible = false
bold_contrast_phrase_from_role_description_visible = false

[security_boundary]
# Whether to fuse workspace_path with path-resolution instruction in a single sentence
fuse_workspace_path_and_resolver = true

# Whether to render a label line before display entries
filesystem_permissions_label_visible = true

# Whether to render a preamble between heading and entries
section_preamble_visible = true

# Whether to render a closing after entries
section_closing_visible = false

# Whether to show tool names alongside paths (hooks enforce regardless)
tool_names_visible = true

# Framing paradigm: selects which content posture the section uses
framing_selector = "territory"  # "territory" | "environmental" | "cage" — governs: framing_heading_variant, framing_declaration_variant_template, framing_preamble_variant

[critical_rules]
# Prelude
authority_preamble_visible = true
rule_count_awareness_preamble_template_visible = "auto"       # "auto" | "always" | "never"
rule_count_awareness_preamble_template_auto_threshold = 5

# Universal rules
workspace_confinement_declaration_template_visible = true
fail_fast_body_visible = true
input_is_your_only_source_body_visible = true
no_invention_body_visible = true

# Output tool rules (conditional on has_output_tool)
output_tool_exclusivity_declaration_template_visible = true
batch_discipline_declaration_template_visible = true                    # also requires batch_size
# Experimental
discipline_over_helpfulness_body_visible = false

# Presentation
rule_presentation = "single_sentence"  # "single_sentence" | "heading_plus_body"
internal_hierarchy = "flat"            # "flat" | "universal_then_output_tool"

[instructions]
# Heading
heading_selector = "default"                   # "default" | "procedure" | "steps_with_count"

# Mode infrastructure
instruction_mode_explanation_visible = "auto" # "auto" (render when mixed modes) | "always" | "never"
instruction_mode_marker_placement = "header_fused"  # "header_fused" | "body_prefix" | "visual_formatting"
signal_at_mode_change_visible = false

# Preamble components
step_count_preamble_template_visible = true
no_add_skip_reorder_preamble_visible = true
instruction_mode_preview_preamble_visible = true
no_extra_operations_preamble_visible = true

# Step structure
step_index_tracking = "n_of_m"  # "n_only" | "n_of_m"
step_done_when_postscript_template_visible = false

# Closing
guardrail_closing_template_visible = true
instruction_mode_recap_closing_template_visible = false

# Dependency and progress
cross_step_dependency_label_template_visible = false
reminder_midpoint_preamble_template_visible = false

# Scaffolding tier override (null = auto from step count)
scaffolding_tier_override = "auto"  # "auto" | "lightweight" | "standard" | "heavy"

[examples]
section_preamble_visible = true

# Group heading suppression for single-group agents
suppress_lone_group_heading = true

# Override for per-group example_display_headings from data
example_display_headings_override = false

# Override for per-group examples_max_number from data
examples_max_number_override = false

# Whether a framing preamble renders between the group heading and first entry
group_framing_preamble_template_visible = false

[constraints]
# Visibility / activation
section_visible = true

# Maximum entries to render (0 = render all)
max_entries_rendered = 0

section_preamble_visible = true
constraints_are_not_steps_preamble_visible = true
no_inferred_constraints_visible = true
closing_compliance_reminder_visible = true
constraint_count_heading_template_visible = true
hierarchy_tier_comparison_preamble_visible = true
hierarchy_three_tier_explanation_preamble_visible = true

# Variant selectors (conditional on their _visible gates above)
section_preamble_selector = "standalone"       # "standalone" | "references_instructions" | "references_critical_rules"
no_inferred_constraints_preamble_selector = "light"     # "light" | "explicit"
compliance_reminder_closing_selector = "evaluation_warning"  # "evaluation_warning" | "simultaneity"

[anti_patterns]
# Whether to render the section at all
section_visible = true

# Maximum entries to render (0 = render all)
max_entries_rendered = 0

# Whether to include a preamble line before the pattern list
section_preamble_visible = true

# Whether to include authority positioning prose
constraints_vs_anti_patterns_distinction_preamble_visible = true

[success_criteria]
# Master visibility toggle
section_visible = true

# Maximum entries to render (0 = render all)
max_entries_rendered = 0

# Definition framing paradigm
definition_declaration_selector = "declarative_assertion"

# Evidence list framing paradigm
evidence_intro_selector = "properties"

# Hierarchy connector paradigm
definition_to_evidence_transition_selector = "goal_then_criteria"

# Evidence type handling
evidence_type_handling = "undifferentiated"

# Voice paradigm
output_vs_agent_voice = "output_centric"

# Whether to include explicit statement that success != not-failing
success_failure_independence_statement_postscript_visible = true

# Whether to include verification guidance suffix for mixed evidence lists
verification_guidance_postscript_visible = false

# Multi-criteria relationship paradigm
multi_criteria_relationship = "independent_blocks"

[failure_criteria]
# Master visibility toggle
section_visible = true

# Maximum entries to render (0 = render all)
max_entries_rendered = 0

# Whether to render the behavioral preamble
abort_stance_preamble_visible = true

# Whether to include hierarchy framing
cite_definition_and_evidence_postscript_visible = false

# Whether to include the generic temporal instruction
check_before_and_during_postscript_visible = false

# Abort behavioral posture (both selectors use same value — they switch together)
abort_stance_selector = "obligation"  # "obligation" | "permission"

[input]
section_preamble_visible = true
context_required_preamble_visible = true
parameters_transition_visible = true
input_completeness_postscript_visible = false
schema_label_template_visible = true
parameters_heading_visible = "auto"
parameters_heading_auto_threshold = 2

[output]
# Variant selectors
schema_embed = false
directory_location_selector = "standard"    # "standard" | "with_boundary"

[writing_output]
# Transition sentence connecting from instructions to this section
transition_preamble_visible = true

# Tool exclusivity mandate prose
tool_mandate_preamble_visible = true

# Heredoc syntax explanation
heredoc_explanation_postscript_visible = false

[return_format]
# Two-channel model
files_vs_status_explanation_preamble_visible = true

# Protocol preamble
token_must_be_first_word_preamble_visible = true

# Metrics obligation
report_all_metrics_postscript_visible = true

# ABORT vs FAILURE semantic distinction
abort_vs_failure_distinction_preamble_visible = true

# Failure honesty
honest_failure_over_dubious_success_preamble_visible = true

# Retroactive orientation
track_metrics_as_you_work_postscript_visible = true

# Accuracy clause
do_not_fabricate_metrics_postscript_visible = true

# Cross-reference to failure_criteria section
failure_cross_reference_preamble_visible = false
